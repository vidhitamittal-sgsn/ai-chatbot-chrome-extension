<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    :root {
      --bg-color: #ffffff;
      --panel-bg: #f8f9fa;
      --text-main: #1a1a1a;
      --text-muted: #666666;
      --primary: #007aff; /* Apple-style clean blue */
      --primary-hover: #0062cc;
      --border-color: #e5e5e7;
      --user-bubble: #e1f5fe;
      --ai-bubble: #f1f3f4;
    }

    body { 
      width: 340px; 
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
      margin: 0; 
      background-color: var(--bg-color);
      color: var(--text-main);
      display: flex; 
      flex-direction: column;
      height: 400px;
    }

    /* Header styling */
    .header {
      padding: 14px 16px;
      border-bottom: 1px solid var(--border-color);
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .header h3 { 
      margin: 0; 
      font-size: 15px;
      font-weight: 600; 
      color: var(--text-main);
    }

    .status-dot {
      width: 8px;
      height: 8px;
      background-color: #34c759; /* Green active status */
      border-radius: 50%;
    }

    /* Chat Area */
    #chat-box { 
      flex-grow: 1;
      padding: 16px; 
      overflow-y: auto; 
      display: flex;
      flex-direction: column;
      gap: 12px;
      background: var(--bg-color);
    }

    /* Modern Message Bubbles */
    .message { 
      max-width: 85%;
      padding: 10px 14px;
      border-radius: 18px;
      font-size: 13px;
      line-height: 1.4;
      word-wrap: break-word;
      animation: fadeIn 0.2s ease-out;
    }

    .user { 
      align-self: flex-end;
      background-color: var(--primary);
      color: white;
      border-bottom-right-radius: 4px;
    }

    .ai { 
      align-self: flex-start;
      background-color: var(--ai-bubble);
      color: var(--text-main);
      border-bottom-left-radius: 4px;
    }

    .error { 
      align-self: center;
      background-color: #ffeef0;
      color: #ff3b30;
      font-size: 12px;
      border-radius: 8px;
      border: 1px solid #ffd1d5;
      max-width: 95%;
    }

    /* Input Footer Container */
    #input-container { 
      display: flex; 
      gap: 8px; 
      padding: 12px 16px 16px 16px;
      border-top: 1px solid var(--border-color);
      background: var(--panel-bg);
    }

    input { 
      flex-grow: 1; 
      padding: 10px 14px; 
      border: 1px solid var(--border-color); 
      border-radius: 20px; 
      font-size: 13px;
      outline: none;
      background: var(--bg-color);
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    input:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(0, 122, 255, 0.15);
    }

    /* Clean Icon/Text Button */
    button { 
      padding: 0 16px; 
      background: var(--primary); 
      color: white; 
      border: none; 
      border-radius: 20px; 
      font-size: 13px;
      font-weight: 500;
      cursor: pointer; 
      transition: background 0.2s, transform 0.1s;
    }

    button:hover { 
      background: var(--primary-hover);
    }

    button:active {
      transform: scale(0.97);
    }

    button:disabled { 
      background: var(--border-color); 
      color: var(--text-muted);
      cursor: not-allowed;
      transform: none;
    }

    /* Custom Scrollbar for a premium feel */
    ::-webkit-scrollbar {
      width: 6px;
    }
    ::-webkit-scrollbar-track {
      background: transparent;
    }
    ::-webkit-scrollbar-thumb {
      background: #d1d1d6;
      border-radius: 10px;
    }
    ::-webkit-scrollbar-thumb:hover {
      background: #acacb0;
    }

    .suggestion-chip {
      background: #f1f3f4;
      border: 1px solid #e5e5e7;
      color: #007aff;
      padding: 8px 12px;
      border-radius: 12px;
      font-size: 12px;
      line-height: 1.3;
      cursor: pointer;
      transition: all 0.2s;
      /* Fixed layout rules: text wraps automatically instead of vanishing */
      white-space: normal; 
      word-wrap: break-word;
      text-align: left;
      width: 100%; /* Spans full width cleanly so short lines are readable */
      box-sizing: border-box;
    }
    .suggestion-chip:hover {
      background: #e1f5fe;
      border-color: #007aff;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(4px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="status-dot"></div>
    <h3>Screen AI Assistant</h3>
  </div>
  
  <div id="chat-box">
    <div class="message ai">Hi! Ask me anything about what's visible on your screen right now.</div>
  </div>

  <div id="suggestions-container" style="display: flex; flex-direction: column; gap: 8px; padding: 0 16px 12px 16px;"></div>

  <div id="input-container">
    <input type="text" id="user-input" placeholder="Ask a question..." autocomplete="off">
    <button id="send-btn">Send</button>
  </div>
  
  <script src="popup.js"></script>
</body>
</html>
