<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    body { width: 320px; font-family: Arial, sans-serif; margin: 10px; display: flex; flex-direction: column; }
    h3 { margin-top: 0; color: #333; }
    #chat-box { height: 200px; border: 1px solid #ccc; padding: 8px; overflow-y: auto; margin-bottom: 8px; border-radius: 4px; font-size: 13px; background: #f9f9f9; }
    .message { margin-bottom: 8px; }
    .user { color: #0066cc; font-weight: bold; }
    .ai { color: #222; }
    .error { color: red; font-style: italic; }
    #input-container { display: flex; gap: 5px; }
    input { flex-grow: 1; padding: 6px; border: 1px solid #ccc; border-radius: 4px; }
    button { padding: 6px 12px; background: #0066cc; color: white; border: none; border-radius: 4px; cursor: pointer; }
    button:disabled { background: #aaa; }
  </style>
</head>
<body>
  <h3>Chat with Page</h3>
  <div id="chat-box">
    <div class="message ai">Hi! Ask me anything about this page's content.</div>
  </div>
  <div id="input-container">
    <input type="text" id="user-input" placeholder="Ask a question..." autocomplete="off">
    <button id="send-btn">Send</button>
  </div>
  <script src="popup.js"></script>
</body>
</html>
